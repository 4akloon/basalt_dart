name: basalt_example
description: Example app — the basalt migration workflow plus typed queries.
version: 0.0.1
publish_to: none

environment:
  sdk: ">=3.5.0 <4.0.0"

resolution: workspace

dependencies:
  basalt: ^0.0.1
  basalt_sqlite: ^0.0.1

dev_dependencies:
  # Provides the `basalt` migration CLI: dart run basalt_cli:basalt ...
  basalt_cli: ^0.0.1
  # Row-mapper codegen: dart run build_runner build
  basalt_codegen: ^0.0.1
  build_runner: ^2.4.0
  # DevTools inspector launcher (tool/inspect.dart): starts a Dart Tooling Daemon
  dtd: ^4.0.0
