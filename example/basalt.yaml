# Config read by the `basalt` CLI (run from this directory). Used at *development
# time* to apply migrations against a throwaway dev DB and to regenerate the typed
# schema. The running Flutter app applies the same migrations from bundled assets.
database_url: example.db
migrations_dir: migrations
schema_output: lib/core/database/schema.dart

# Custom column types: `generate-schema` emits these SqlTypes/Dart types instead
# of the built-in mapping. Here the free-form `products.metadata` JSON column is
# backed by the app's own `JsonMapOrNullSqlType` codec.
types:
  columns:
    products.metadata:
      dart_type: "Map<String, Object?>?"
      sql_type: "JsonMapOrNullSqlType()"
      import: "package:basalt_example/core/database/json_map_sql_type.dart"
