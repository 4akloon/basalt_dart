# Publishes one package to pub.dev when its release tag is pushed.
#
# Tag convention: <package>-v<version> (e.g. `basalt-v0.0.2`,
# `basalt_sqlite-v0.0.3`) — only the tagged package is published, matching the
# repo's "bump only what changed" release policy.
#
# Auth is pub.dev's GitHub Actions OIDC flow (no secrets): `dart-lang/setup-dart`
# mints a temporary pub.dev credential from the job's `id-token`. For it to be
# accepted, each package must have automated publishing enabled on pub.dev
# (Admin → Automated publishing): repository `4akloon/basalt_dart`, tag pattern
# `<package>-v{{version}}`, and the `pub.dev` GitHub environment required.
# NOTE: pub.dev only allows this for *existing* packages — the very first
# version of each package has to be published manually (`dart pub publish`).
name: Publish

on:
  push:
    tags:
      - 'basalt-v*'
      - 'basalt_sqlite-v*'
      - 'basalt_postgres-v*'
      - 'basalt_cli-v*'
      - 'basalt_codegen-v*'
      - 'basalt_mcp-v*'

jobs:
  publish:
    name: Publish to pub.dev
    runs-on: ubuntu-latest
    environment: pub.dev
    permissions:
      id-token: write # pub.dev OIDC token exchange

    steps:
      - uses: actions/checkout@v5

      - name: Parse package & version from the tag
        id: meta
        run: |
          TAG="$GITHUB_REF_NAME"
          echo "package=${TAG%-v*}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG##*-v}" >> "$GITHUB_OUTPUT"

      - name: Verify the pubspec version matches the tag
        run: >-
          grep -qx 'version: ${{ steps.meta.outputs.version }}'
          'packages/${{ steps.meta.outputs.package }}/pubspec.yaml'

      # Mints the temporary pub.dev credential from the job's OIDC token.
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      # Installed after setup-dart so Flutter's `dart` wins the PATH: the repo
      # tree contains Flutter apps (example/, basalt_devtools_extension/) whose
      # `sdk: flutter` deps a plain Dart SDK can't resolve. The pub credential
      # store is shared between the two SDKs.
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # basalt ships the compiled DevTools extension, which is a Flutter web app
      # kept out of git — regenerate it before publishing (same as the CI
      # dry-run, so a green CI run predicts a publishable package).
      - name: Build DevTools extension (ships inside basalt)
        if: steps.meta.outputs.package == 'basalt'
        working-directory: packages/basalt_devtools_extension
        run: |
          flutter pub get
          dart run devtools_extensions build_and_copy \
            --source=. --dest=../basalt/extension/devtools

      - name: Install dependencies (workspace)
        run: dart pub get

      - name: Publish ${{ steps.meta.outputs.package }} ${{ steps.meta.outputs.version }}
        run: dart pub publish --force
        working-directory: packages/${{ steps.meta.outputs.package }}
