name: basalt_cli
description: >-
  The `basalt` command-line tool for the Basalt Dart ORM — migrations, database
  reset, and schema generation over any pluggable backend.
version: 0.0.2
repository: https://github.com/4akloon/basalt_dart
homepage: https://github.com/4akloon/basalt_dart
issue_tracker: https://github.com/4akloon/basalt_dart/issues
documentation: https://github.com/4akloon/basalt_dart/tree/main/packages/basalt_cli/doc
topics: [orm, cli, migrations, code-generation]

environment:
  sdk: ">=3.5.0 <4.0.0"

resolution: workspace

executables:
  basalt:

dependencies:
  basalt: '>=0.0.1 <0.1.0'
  args: ^2.5.0
  path: ^1.9.0
  yaml: ^3.1.2

dev_dependencies:
  # Backends are NOT runtime deps — the CLI reaches them through the generated
  # bootstrap entrypoint. basalt_sqlite is only here for the package's tests.
  basalt_sqlite: ^0.0.1
  test: ^1.26.3
