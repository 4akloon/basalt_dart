name: basalt_codegen
description: >-
  build_runner code generator for the Basalt Dart ORM — derives row readers and
  INSERT/UPDATE builders from @Queryable, @Insertable, and @AsChangeset.
version: 0.0.1
repository: https://github.com/4akloon/basalt_dart
homepage: https://github.com/4akloon/basalt_dart
issue_tracker: https://github.com/4akloon/basalt_dart/issues
documentation: https://github.com/4akloon/basalt_dart/tree/main/packages/basalt_codegen/doc
topics: [orm, code-generation, build-runner, database]

environment:
  sdk: ">=3.5.0 <4.0.0"

resolution: workspace

dependencies:
  basalt: ^0.0.1
  analyzer: ">=8.0.0 <14.0.0"
  build: ^4.0.0
  source_gen: ^4.2.0

dev_dependencies:
  build_runner: ^2.15.0
  build_test: ^3.5.0
  test: ^1.26.3
