name: basalt_mcp
description: >-
  MCP server that lets AI agents inspect live Basalt database connections in a
  running debug app — schema, table data, and SQL via VM service extensions.
version: 0.0.1
repository: https://github.com/4akloon/basalt_dart
homepage: https://github.com/4akloon/basalt_dart
issue_tracker: https://github.com/4akloon/basalt_dart/issues
documentation: https://github.com/4akloon/basalt_dart/tree/main/packages/basalt_mcp/doc
topics: [orm, mcp, ai, devtools]

environment:
  sdk: ">=3.5.0 <4.0.0"

resolution: workspace

executables:
  basalt_mcp:

dependencies:
  args: ^2.5.0
  basalt: '>=0.0.2 <0.1.0'
  logging: ^1.3.0
  mcp_dart: ^2.1.0
  vm_service: ^15.0.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.26.3
