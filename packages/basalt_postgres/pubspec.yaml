name: basalt_postgres
description: >-
  Postgres backend for the Basalt Dart ORM — a driver-backed Connection +
  SqlDialect on package:postgres, with introspection and json/uuid/numeric/array
  codecs.
version: 0.0.2
repository: https://github.com/4akloon/basalt_dart
homepage: https://github.com/4akloon/basalt_dart
issue_tracker: https://github.com/4akloon/basalt_dart/issues
documentation: https://github.com/4akloon/basalt_dart/tree/main/packages/basalt_postgres/doc
topics: [orm, database, postgres, sql]

environment:
  sdk: ">=3.5.0 <4.0.0"

resolution: workspace

dependencies:
  basalt: '>=0.0.2 <0.1.0'
  postgres: ^3.0.0

dev_dependencies:
  test: ^1.26.3
